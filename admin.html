<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz - Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .form-card { background-color: #161b22; border: 1px solid #30363d; }
    </style>
</head>
<body class="min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center bg-[#161b22] border border-[#30363d] rounded-xl p-6 mb-8 shadow-xl">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <i class="fas fa-user-shield text-blue-500"></i> Operation Baaz <span class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2.5 py-1 rounded-full font-normal">Admin Panel</span>
                </h1>
                <p class="text-sm text-gray-400 mt-1">Upload PDF mock test papers directly from your computer.</p>
            </div>
            <a href="index.html" class="bg-[#21262d] hover:bg-[#30363d] border border-[#30363d] text-gray-200 px-4 py-2 rounded-lg font-medium transition flex items-center gap-2 text-sm">
                <i class="fas fa-arrow-left"></i> Student Portal
            </a>
        </header>

        <div class="form-card rounded-xl p-8 shadow-xl mb-8">
            <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt text-emerald-500"></i> Upload New Mock Test (PDF)
            </h2>
            
            <form id="add-test-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Test Title / Name</label>
                    <input type="text" id="test-title" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition" placeholder="e.g., General Knowledge Mock 05">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Short Description</label>
                    <textarea id="test-desc" required rows="3" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition resize-none" placeholder="Enter test details here..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Choose Test PDF File</label>
                    <input type="file" id="test-file" accept="application/pdf" required class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition cursor-pointer file:mr-4 file:py-1 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                </div>
                <button type="submit" id="sub-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-lg shadow-lg transition cursor-pointer flex items-center justify-center gap-2">
                    <i class="fas fa-paper-plane"></i> Publish PDF Test Live
                </button>
            </form>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbyMXIG-e-1IRkamMh5TynABpPQQMMFuaUdLxtMLfGuxr6H1K6c7I0ICYm0m5Zk7g8zfLg/exec";

        document.getElementById('add-test-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('sub-btn');
            btn.innerText = "Uploading & Publishing PDF...";
            btn.disabled = true;

            const title = document.getElementById('test-title').value.trim();
            const desc = document.getElementById('test-desc').value.trim();
            const fileInput = document.getElementById('test-file');
            const file = fileInput.files[0];

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function () {
                const fileData = reader.result;

                fetch(SHEET_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        type: "test", 
                        title: title, 
                        description: desc, 
                        fileData: fileData, 
                        fileName: file.name 
                    })
                })
                .then(() => {
                    alert('Success! PDF Uploaded and Test published.');
                    document.getElementById('add-test-form').reset();
                    btn.innerText = "Publish PDF Test Live";
                    btn.disabled = false;
                })
                .catch(err => {
                    alert("Error: " + err.message);
                    btn.innerText = "Publish PDF Test Live";
                    btn.disabled = false;
                });
            };
        });
    </script>
</body>
</html>
