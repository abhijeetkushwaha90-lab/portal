<!DOCTYPE html>
<html lang="hi" data-theme="military">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat — Operation Baaz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html[data-theme="military"] {
  --bg:#0a0f18;--card:#131a26;--border:rgba(33,38,53,0.65);
  --text:#c9d1d9;--text-dim:#7d8590;
  --accent:#d4891a;--accent2:#b8741a;--accent-text:#0e0a00;
  --success:#059669;--success2:#10b981;
}
*{box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  margin:0;height:100vh;display:flex;flex-direction:column;
}
header{
  background:var(--card);border-bottom:0.5px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:10px;
}
header .icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#d4891a,#a83220);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
header .title{font-weight:900;font-size:15px;color:var(--accent);}
header .sub{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;}
#chat-window{
  flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;
}
.msg{max-width:75%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;word-wrap:break-word;}
.msg .meta{font-size:9px;font-weight:800;opacity:.7;margin-bottom:3px;text-transform:uppercase;}
.msg.mine{align-self:flex-end;background:var(--accent);color:var(--accent-text);border-bottom-right-radius:4px;}
.msg.other{align-self:flex-start;background:var(--card);border:0.5px solid var(--border);border-bottom-left-radius:4px;}
.msg.admin{border-left:3px solid var(--accent);}
#empty-state{margin:auto;text-align:center;color:var(--text-dim);font-size:12px;padding:20px;}
#input-bar{
  display:flex;gap:8px;padding:12px;background:var(--card);
  border-top:0.5px solid var(--border);
}
#msg-input{
  flex:1;background:var(--bg);border:0.5px solid var(--border);color:var(--text);
  border-radius:12px;padding:12px 14px;font-size:13px;outline:none;
}
#send-btn{
  background:var(--accent);color:var(--accent-text);border:none;
  border-radius:12px;padding:0 18px;font-weight:800;cursor:pointer;font-size:13px;
}
#send-btn:disabled{opacity:.5;cursor:not-allowed;}
#login-warning{
  margin:auto;text-align:center;padding:24px;color:var(--text-dim);font-size:13px;
}
</style>
</head>
<body>

<header>
  <div class="icon"><i class="fas fa-comments"></i></div>
  <div>
    <div class="title">Live Chat</div>
    <div class="sub">Operation Baaz Support</div>
  </div>
</header>

<div id="chat-window">
  <div id="empty-state">Loading chat...</div>
</div>

<div id="input-bar" style="display:none">
  <input id="msg-input" type="text" placeholder="Apna message likhein..." maxlength="500">
  <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6X6hX2Mnz-d_-Cao6B7bOkRop3RPnCve5-z_R1iV5kdf3PIL9aG6y8dSca84dpIAc/exec";

let currentUser = null;
let lastMessageCount = 0;

function init() {
  const saved = localStorage.getItem('baaz_userdata');
  if (!saved) {
    document.getElementById('chat-window').innerHTML =
      '<div id="login-warning"><i class="fas fa-lock" style="font-size:24px;margin-bottom:8px;display:block"></i>Pehle Operation Baaz app mein login karein, fir chat khulega.</div>';
    return;
  }
  currentUser = JSON.parse(saved);
  document.getElementById('input-bar').style.display = 'flex';
  loadMessages();
  setInterval(loadMessages, 4000);
}

async function loadMessages() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?action=get_chat_messages");
    const data = await res.json();
    if (data.length === lastMessageCount) return;
    lastMessageCount = data.length;
    renderMessages(data);
  } catch (e) {}
}

function renderMessages(messages) {
  const win = document.getElementById('chat-window');
  if (!messages.length) {
    win.innerHTML = '<div id="empty-state">Koi message nahi abhi. Sabse pehle aap baat shuru karein! 👋</div>';
    return;
  }
  win.innerHTML = messages.map(m => {
    const isMine = m.email === currentUser.email;
    const isAdmin = m.role === 'admin';
    const cls = isMine ? 'mine' : (isAdmin ? 'other admin' : 'other');
    return `<div class="msg ${cls}">
      <div class="meta">${escapeHtml(m.name)}${isAdmin ? ' 🛡️ Admin' : ''}</div>
      <div>${escapeHtml(m.message)}</div>
    </div>`;
  }).join('');
  win.scrollTop = win.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "send_chat_message",
        email: currentUser.email,
        name: currentUser.name,
        role: currentUser.role || "student",
        message: text
      })
    });
    loadMessages();
  } catch (e) {}
  document.getElementById('send-btn').disabled = false;
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('msg-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

init();
</script>
</body>
</html>
