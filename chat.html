<!DOCTYPE html>
<html lang="hi" data-theme="military">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat — Operation Baaz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html[data-theme="military"] {
  --bg:#0a0f18;--card:#131a26;--border:rgba(33,38,53,0.65);
  --text:#c9d1d9;--text-dim:#7d8590;
  --accent:#d4891a;--accent2:#b8741a;--accent-text:#0e0a00;
  --success:#059669;--success2:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:
    radial-gradient(circle at 20% 0%, rgba(124,58,237,0.08), transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(212,137,26,0.08), transparent 40%),
    var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}
#app{
  width:100%;max-width:560px;height:100%;
  display:flex;flex-direction:column;
  background:var(--card);
  border-left:0.5px solid var(--border);
  border-right:0.5px solid var(--border);
  box-shadow:0 0 60px rgba(0,0,0,0.4);
}
header{
  background:linear-gradient(135deg,#16202f,#131a26);
  border-bottom:0.5px solid var(--border);
  padding:14px 18px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
header .icon{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;
  box-shadow:0 4px 14px rgba(124,58,237,0.4);
}
header .title{font-weight:900;font-size:15px;color:#fff;letter-spacing:.02em;}
header .sub{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-top:2px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#chat-window{
  flex:1;overflow-y:auto;padding:18px 14px;display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}
#chat-window::-webkit-scrollbar{width:5px;}
#chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.msg-row{display:flex;gap:8px;max-width:82%;margin-bottom:10px;align-items:flex-end;}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.other{align-self:flex-start;}

.avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
}
.avatar.admin{background:linear-gradient(135deg,#d4891a,#a83220);}
.avatar.student{background:linear-gradient(135deg,#3b82f6,#1e40af);}
.avatar.mine{background:linear-gradient(135deg,#7c3aed,#5b21b6);}

.bubble-wrap{display:flex;flex-direction:column;gap:3px;}
.msg-row.mine .bubble-wrap{align-items:flex-end;}
.name-tag{font-size:10px;font-weight:800;color:var(--text-dim);padding:0 4px;display:flex;align-items:center;gap:4px;}
.name-tag .badge{
  font-size:8px;font-weight:900;padding:1px 6px;border-radius:999px;
  background:rgba(212,137,26,0.18);color:var(--accent);
}
.bubble{
  padding:10px 14px;border-radius:16px;font-size:13.5px;line-height:1.5;
  word-wrap:break-word;white-space:pre-wrap;
}
.msg-row.mine .bubble{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
  border-radius:16px 16px 4px 16px;
}
.msg-row.other .bubble{
  background:#1c2433;border:0.5px solid var(--border);color:var(--text);
  border-radius:16px 16px 16px 4px;
}
.msg-row.other.admin-msg .bubble{
  background:linear-gradient(135deg,rgba(212,137,26,0.16),#1c2433);
  border:0.5px solid rgba(212,137,26,0.3);
}
.time-tag{font-size:9px;color:var(--text-dim);padding:0 4px;}

#empty-state{
  margin:auto;text-align:center;color:var(--text-dim);font-size:12.5px;
  display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;
}
#empty-state i{font-size:32px;opacity:.4;}
#login-warning{
  margin:auto;text-align:center;padding:30px;color:var(--text-dim);font-size:13px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
#login-warning i{font-size:30px;color:var(--accent);}

#input-bar{
  display:flex;gap:8px;padding:12px 14px;background:#0e1420;
  border-top:0.5px solid var(--border);flex-shrink:0;
}
#msg-input{
  flex:1;background:var(--bg);border:0.5px solid var(--border);color:var(--text);
  border-radius:24px;padding:12px 18px;font-size:13.5px;outline:none;
}
#msg-input:focus{border-color:var(--accent);}
#send-btn{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;
  cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(124,58,237,0.4);transition:transform .15s;
}
#send-btn:hover{transform:scale(1.06);}
#send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="icon"><i class="fas fa-comments"></i></div>
    <div>
      <div class="title">Live Chat</div>
      <div class="sub"><span class="live-dot"></span>Operation Baaz Support</div>
    </div>
  </header>

  <div id="chat-window">
    <div id="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading chat...</div>
  </div>

  <div id="input-bar" style="display:none">
    <input id="msg-input" type="text" placeholder="Apna message likhein..." maxlength="500">
    <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6X6hX2Mnz-d_-Cao6B7bOkRop3RPnCve5-z_R1iV5kdf3PIL9aG6y8dSca84dpIAc/exec";

let currentUser = null;
let lastMessageCount = 0;
  const notifySound = new Audio("https://cdn.freesound.org/previews/536/536108_7461855-lq.mp3");

function init() {
  const saved = localStorage.getItem('baaz_userdata');
  if (!saved) {
    document.getElementById('chat-window').innerHTML =
      '<div id="login-warning"><i class="fas fa-lock"></i>Pehle Operation Baaz app mein login karein,<br>fir chat khulega.</div>';
    return;
  }
  currentUser = JSON.parse(saved);
  document.getElementById('input-bar').style.display = 'flex';
  loadMessages();
  setInterval(loadMessages, 4000);
}

function initials(name) {
  return (name || "?").trim().split(/\s+/).map(w => w[0]).join("").substring(0,2).toUpperCase();
}

function formatTime(ts) {
  try {
    const d = new Date(ts);
    return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ""; }
}

async function loadMessages() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?action=get_chat_messages");
    const data = await res.json();
    if (data.length === lastMessageCount) return;
    const isFirstLoad = lastMessageCount === 0;
    const isNewIncoming = data.length > lastMessageCount;
    lastMessageCount = data.length;
    renderMessages(data);
    if (isNewIncoming && !isFirstLoad) {
      const last = data[data.length - 1];
      if (last.email !== currentUser.email) {
        notifySound.play().catch(()=>{});
      }
    }
  } catch (e) {}
}

function renderMessages(messages) {
  const win = document.getElementById('chat-window');
  if (!messages.length) {
    win.innerHTML = '<div id="empty-state"><i class="fas fa-comment-dots"></i>Koi message nahi abhi.<br>Sabse pehle aap baat shuru karein! 👋</div>';
    return;
  }
  win.innerHTML = messages.map(m => {
    const isMine = m.email === currentUser.email;
    const isAdmin = m.role === 'admin';
    const rowCls = isMine ? 'msg-row mine' : (isAdmin ? 'msg-row other admin-msg' : 'msg-row other');
    const avatarCls = isMine ? 'mine' : (isAdmin ? 'admin' : 'student');
    return `<div class="${rowCls}">
      <div class="avatar ${avatarCls}">${escapeHtml(initials(m.name))}</div>
      <div class="bubble-wrap">
        <div class="name-tag">${escapeHtml(m.name)}${isAdmin ? '<span class="badge">ADMIN</span>' : ''}</div>
        <div class="bubble">${escapeHtml(m.message)}</div>
        <div class="time-tag">${formatTime(m.timestamp)}</div>
      </div>
    </div>`;
  }).join('');
  win.scrollTop = win.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "send_chat_message",
        email: currentUser.email,
        name: currentUser.name,
        role: currentUser.role || "student",
        message: text
      })
    });
    loadMessages();
  } catch (e) {}
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('msg-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') sendMessage();
});

init();
</script>
</body>
</html>
