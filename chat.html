<!DOCTYPE html>
<html lang="hi" data-theme="military">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Chat — Operation Baaz</title>
<link rel="manifest" href="/portal/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
html[data-theme="military"] {
  --bg:#0a0f18;--card:#131a26;--border:rgba(33,38,53,0.65);
  --text:#c9d1d9;--text-dim:#7d8590;
  --accent:#d4891a;--accent2:#b8741a;--accent-text:#0e0a00;
  --success:#059669;--success2:#10b981;
  --danger:#e11d48;
}
html[data-theme="light"] {
  --bg:#f1f5f9;--card:#ffffff;--border:rgba(0,0,0,0.1);
  --text:#1e293b;--text-dim:#64748b;
  --accent:#7c3aed;--accent2:#6d28d9;--accent-text:#ffffff;
  --success:#059669;--success2:#10b981;
  --danger:#e11d48;
}
*{box-sizing:border-box;margin:0;padding:0;transition:background .2s,color .2s;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,sans-serif;
  height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}
#app{
  width:100%;max-width:560px;height:100%;
  display:flex;flex-direction:column;
  background:var(--card);
  border-left:0.5px solid var(--border);
  border-right:0.5px solid var(--border);
  box-shadow:0 0 60px rgba(0,0,0,0.3);
  position:relative;
}
header{
  background:linear-gradient(135deg,#16202f,#131a26);
  border-bottom:0.5px solid var(--border);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  flex-shrink:0;
}
html[data-theme="light"] header{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
header .icon{
  width:40px;height:40px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#a855f7);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;
  box-shadow:0 4px 14px rgba(124,58,237,0.4);
}
header .title{font-weight:900;font-size:14px;color:#fff;letter-spacing:.02em;flex:1;}
header .sub{font-size:9px;color:rgba(255,255,255,0.6);font-weight:700;text-transform:uppercase;display:flex;align-items:center;gap:5px;margin-top:2px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981;animation:pulse 1.6s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#theme-btn{
  background:rgba(255,255,255,0.15);border:none;color:#fff;
  width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;
}
#theme-btn:hover{background:rgba(255,255,255,0.25);}

#online-count{
  font-size:9px;font-weight:800;color:#10b981;
  background:rgba(16,185,129,0.1);border:0.5px solid rgba(16,185,129,0.3);
  padding:2px 8px;border-radius:999px;flex-shrink:0;
}

#chat-window{
  flex:1;overflow-y:auto;padding:14px 12px 8px;display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth;
}
#chat-window::-webkit-scrollbar{width:4px;}
#chat-window::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

#typing-indicator{
  display:none;padding:6px 14px 2px;
  font-size:11px;color:var(--text-dim);font-style:italic;
  align-items:center;gap:6px;
}
.typing-dots span{
  display:inline-block;width:5px;height:5px;border-radius:50%;
  background:var(--text-dim);margin:0 1px;
  animation:typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.msg-row{display:flex;gap:8px;max-width:84%;margin-bottom:8px;align-items:flex-end;}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-row.other{align-self:flex-start;}

.avatar{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
  overflow:hidden;cursor:pointer;
}
.avatar.admin{background:linear-gradient(135deg,#d4891a,#a83220);}
.avatar.male{background:linear-gradient(135deg,#3b82f6,#1e40af);border:2px solid #3b82f6;}
.avatar.female{background:linear-gradient(135deg,#ec4899,#be185d);border:2px solid #ec4899;}
.avatar.mine{background:linear-gradient(135deg,#7c3aed,#5b21b6);}

.bubble-wrap{display:flex;flex-direction:column;gap:2px;position:relative;}
.msg-row.mine .bubble-wrap{align-items:flex-end;}
.name-tag{font-size:11px;font-weight:800;color:var(--text);padding:0 4px;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.name-tag .badge{
  font-size:7px;font-weight:900;padding:1px 5px;border-radius:999px;
  background:rgba(212,137,26,0.18);color:var(--accent);
}
.bubble{
  padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.5;
  word-wrap:break-word;white-space:pre-wrap;position:relative;
}
.msg-row.mine .bubble{
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
  border-radius:16px 16px 4px 16px;
}
.msg-row.other .bubble{
  background:var(--bg);border:0.5px solid var(--border);color:var(--text);
  border-radius:16px 16px 16px 4px;
}
.msg-row.other.admin-msg .bubble{
  background:linear-gradient(135deg,rgba(212,137,26,0.12),var(--bg));
  border:0.5px solid rgba(212,137,26,0.3);
}

.delete-btn{
  display:none;position:absolute;top:-8px;right:-8px;
  width:20px;height:20px;border-radius:50%;
  background:#e11d48;color:#fff;border:none;
  font-size:9px;cursor:pointer;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
.bubble-wrap:hover .delete-btn{display:flex;}

.time-tag{font-size:9px;color:var(--text-dim);padding:0 4px;display:flex;align-items:center;gap:3px;}
.tick{font-size:10px;}
.tick.seen{color:#10b981;}
.tick.sent{color:var(--text-dim);}

.date-divider{
  text-align:center;font-size:9px;font-weight:800;
  color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;
  margin:8px 0;display:flex;align-items:center;gap:8px;
}
.date-divider::before,.date-divider::after{content:'';flex:1;height:0.5px;background:var(--border);}

#empty-state{
  margin:auto;text-align:center;color:var(--text-dim);font-size:12px;
  display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;
}
#empty-state i{font-size:30px;opacity:.4;}
#login-warning{
  margin:auto;text-align:center;padding:30px;color:var(--text-dim);font-size:13px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
#login-warning i{font-size:28px;color:var(--accent);}

#input-bar{
  flex-shrink:0;
  border-top:0.5px solid var(--border);
  background:var(--card);
}
#input-row{
  display:flex;gap:8px;padding:10px 12px;align-items:center;
}
#msg-input{
  flex:1;background:var(--bg);border:0.5px solid var(--border);color:var(--text);
  border-radius:24px;padding:10px 16px;font-size:13px;outline:none;
}
#msg-input:focus{border-color:var(--accent);}
#msg-input::placeholder{color:var(--text-dim);}

#emoji-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--bg);border:0.5px solid var(--border);color:var(--text-dim);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
}
#emoji-btn:hover{border-color:var(--accent);color:var(--accent);}

#send-btn{
  width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border:none;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(124,58,237,0.4);transition:transform .15s;
}
#send-btn:hover{transform:scale(1.06);}
#send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

#emoji-picker{
  display:none;padding:10px 12px;border-top:0.5px solid var(--border);
  flex-wrap:wrap;gap:4px;max-height:140px;overflow-y:auto;
  background:var(--bg);
}
#emoji-picker.open{display:flex;}
#emoji-picker span{
  font-size:22px;cursor:pointer;padding:4px;border-radius:8px;
  transition:transform .1s;
}
#emoji-picker span:hover{transform:scale(1.3);background:var(--border);}

#notif-badge{
  display:none;position:absolute;top:8px;right:8px;
  background:#e11d48;color:#fff;font-size:9px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(225,29,72,0.5);
  animation:badgePop .3s ease;
}
@keyframes badgePop{0%{transform:scale(0)}100%{transform:scale(1)}}

/* NOTIF PERMISSION BANNER */
#notif-banner{
  display:none;
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(212,137,26,0.1));
  border-bottom:0.5px solid rgba(124,58,237,0.3);
  padding:8px 12px;
  font-size:11px;font-weight:700;color:var(--text);
  align-items:center;gap:8px;
  flex-shrink:0;
}
#notif-banner button{
  background:var(--accent);color:#000;border:none;
  padding:3px 10px;border-radius:8px;font-size:10px;font-weight:800;cursor:pointer;
  flex-shrink:0;
}
#notif-banner .close-banner{
  background:transparent;color:var(--text-dim);margin-left:auto;font-size:14px;
}

/* REPLY PREVIEW */
#reply-preview {
  display:none;
  background:rgba(124,58,237,0.1);
  border-left:3px solid var(--accent);
  padding:6px 12px;
  font-size:11px;
  color:var(--text-dim);
  align-items:center;
  gap:8px;
  flex-shrink:0;
}
#reply-preview .reply-text {
  flex:1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
#reply-preview .reply-close {
  cursor:pointer;
  background:none;
  border:none;
  color:var(--text-dim);
  font-size:14px;
}
.reply-bubble {
  background:rgba(124,58,237,0.08);
  border-left:2px solid var(--accent);
  border-radius:6px;
  padding:4px 8px;
  font-size:10px;
  color:var(--text-dim);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* REACTIONS */
.reaction-bar {
  display:flex;gap:4px;margin-top:2px;flex-wrap:wrap;
}
.reaction-btn {
  background:var(--bg);border:0.5px solid var(--border);
  border-radius:999px;padding:2px 8px;font-size:12px;
  cursor:pointer;transition:transform .1s;
}
.reaction-btn:hover{transform:scale(1.2);}
.reaction-btn.active{
  background:rgba(124,58,237,0.15);
  border-color:var(--accent);
}
.react-trigger {
  font-size:11px;cursor:pointer;opacity:0;
  transition:opacity .2s;color:var(--text-dim);
  background:none;border:none;padding:2px 6px;
}
.bubble-wrap:hover .react-trigger{opacity:1;}
  #scroll-btn {
  display:none;position:absolute;bottom:80px;right:16px;
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  color:#fff;border:none;cursor:pointer;font-size:16px;
  box-shadow:0 4px 12px rgba(124,58,237,0.4);
  align-items:center;justify-content:center;z-index:99;
}
  #announce-bar {
  display:none;
  background:linear-gradient(135deg,rgba(212,137,26,0.15),rgba(212,137,26,0.05));
  border-bottom:0.5px solid rgba(212,137,26,0.4);
  padding:8px 12px;
  font-size:11px;font-weight:700;color:var(--accent);
  align-items:center;gap:8px;flex-shrink:0;
}
#announce-bar i{font-size:12px;}
  #pin-bar {
  display:none;
  background:linear-gradient(135deg,rgba(16,185,129,0.12),rgba(16,185,129,0.05));
  border-bottom:0.5px solid rgba(16,185,129,0.3);
  padding:8px 12px;
  font-size:11px;font-weight:700;color:#10b981;
  align-items:center;gap:8px;flex-shrink:0;
  cursor:pointer;
}
#pin-bar i{font-size:12px;}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="icon"><i class="fas fa-comments"></i></div>
    <div style="flex:1">
      <div class="title">Live Chat</div>
      <div class="sub"><span class="live-dot"></span>Operation Baaz Support</div>
    </div>
    <span id="online-count">● Online</span>
    <button id="theme-btn" onclick="toggleTheme()" title="Theme Toggle">
      <i class="fas fa-moon" id="theme-icon"></i>
    </button>
    <div id="notif-badge">0</div>
  </header>

  <!-- NOTIFICATION PERMISSION BANNER -->
  <div id="notif-banner">
    <i class="fas fa-bell" style="color:var(--accent)"></i>
    <span>Naye messages ki notification paane ke liye allow karo</span>
    <button onclick="askNotifPermission()">Allow 🔔</button>
    <button class="close-banner" onclick="document.getElementById('notif-banner').style.display='none'">✕</button>
  </div>
 <div id="announce-bar">
  <i class="fas fa-bullhorn"></i>
  <span id="announce-text"></span>
</div>
<div id="pin-bar">
  <i class="fas fa-thumbtack"></i>
  <span id="pin-text"></span>
</div>

  <!-- REPLY PREVIEW BAR -->
  <div id="reply-preview">
    <i class="fas fa-reply" style="color:var(--accent);font-size:12px;"></i>
    <div class="reply-text" id="reply-preview-text">Replying to...</div>
    <button class="reply-close" onclick="cancelReply()">✕</button>
  </div>

  <div id="chat-window">
    <div id="empty-state"><i class="fas fa-spinner fa-spin"></i>Loading chat...</div>
  </div>
<button id="scroll-btn" onclick="scrollToBottom()">⬇</button>
  <div id="typing-indicator">
    <div class="typing-dots"><span></span><span></span><span></span></div>
    <span id="typing-name">Admin</span> typing...
  </div>

  <div id="input-bar" style="display:none">
    <div id="input-row">
      <button id="emoji-btn" onclick="toggleEmoji()">😊</button>
      <input id="msg-input" type="text" placeholder="Apna message likhein..." maxlength="500">
      <button id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
    <div id="emoji-picker">
      😊 😂 🙏 👍 ❤️ 🔥 💪 🎯 ✅ ❌ 😎 🤔 👏 🥳 😅 😭 🙌 💯 🚀 ⚡
      😇 🤝 👋 😍 🤩 😤 😬 😴 🥱 😮 🫡 🫶 💀 👀 🎉 🏆 📚 ✏️ 🧠 💡
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6X6hX2Mnz-d_-Cao6B7bOkRop3RPnCve5-z_R1iV5kdf3PIL9aG6y8dSca84dpIAc/exec";

const BAD_WORDS = ['gali1','gali2','bc','mc','bkl','sala','harami','chutiya','madarchod','behenchod','randi','gaand'];

let currentUser = null;
let lastMessageCount = 0;
let unreadCount = 0;
let emojiOpen = false;
let isWindowFocused = true;

const notifySound = new Audio("https://cdn.freesound.org/previews/536/536108_7461855-lq.mp3");

/* ── PUSH NOTIFICATIONS ── */
function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notif-banner').style.display = 'flex';
  }
}

function askNotifPermission() {
  if (!('Notification' in window)) {
    alert('Aapka browser notifications support nahi karta.');
    return;
  }
  Notification.requestPermission().then(permission => {
    document.getElementById('notif-banner').style.display = 'none';
    if (permission === 'granted') {
      new Notification('✅ Notifications ON!', {
        body: 'Ab aapko Operation Baaz chat ke messages milenge.',
        icon: 'https://cdn-icons-png.flaticon.com/512/134/134914.png'
      });
    }
  });
}

function showPushNotification(name, message) {
  if (!('Notification' in window)) return;
  if (Notification.permission !== 'granted') return;
  if (isWindowFocused) return;
  try {
    new Notification('💬 ' + name, {
      body: message.length > 60 ? message.substring(0, 60) + '...' : message,
      icon: 'https://cdn-icons-png.flaticon.com/512/134/134914.png',
      badge: 'https://cdn-icons-png.flaticon.com/512/134/134914.png',
      tag: 'baaz-chat',
      renotify: true,
      vibrate: [200, 100, 200]
    });
  } catch(e) {}
}

/* ── THEME ── */
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  html.setAttribute('data-theme', isLight ? 'military' : 'light');
  document.getElementById('theme-icon').className = isLight ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('baaz_chat_theme', isLight ? 'military' : 'light');
}

function loadTheme() {
  const t = localStorage.getItem('baaz_chat_theme') || 'military';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').className = t === 'light' ? 'fas fa-sun' : 'fas fa-moon';
}

/* ── EMOJI ── */
function toggleEmoji() {
  emojiOpen = !emojiOpen;
  document.getElementById('emoji-picker').classList.toggle('open', emojiOpen);
}

document.addEventListener('DOMContentLoaded', () => {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = picker.textContent.trim().split(/\s+/).map(e =>
    `<span>${e}</span>`
  ).join('');
  picker.querySelectorAll('span').forEach(span => {
    span.onclick = () => {
      document.getElementById('msg-input').value += span.textContent;
      document.getElementById('msg-input').focus();
    };
  });
});

/* ── BAD WORDS FILTER ── */
function filterBadWords(text) {
  let clean = text;
  BAD_WORDS.forEach(w => {
    const re = new RegExp(w, 'gi');
    clean = clean.replace(re, '*'.repeat(w.length));
  });
  return clean;
}

/* ── WINDOW FOCUS ── */
window.addEventListener('focus', () => {
  isWindowFocused = true;
  clearBadge();
});
window.addEventListener('blur', () => {
  isWindowFocused = false;
});

/* ── NOTIFICATION BADGE ── */
function showBadge() {
  unreadCount++;
  const b = document.getElementById('notif-badge');
  b.innerText = unreadCount;
  b.style.display = 'flex';
  document.title = `(${unreadCount}) Live Chat — Operation Baaz`;
}

function clearBadge() {
  unreadCount = 0;
  document.getElementById('notif-badge').style.display = 'none';
  document.title = 'Live Chat — Operation Baaz';
}

/* ── INIT ── */
function init() {
  loadTheme();
  const saved = localStorage.getItem('baaz_userdata');
  if (!saved) {
    document.getElementById('chat-window').innerHTML =
      '<div id="login-warning"><i class="fas fa-lock"></i>Pehle Operation Baaz app mein login karein,<br>fir chat khulega.</div>';
    return;
  }
  currentUser = JSON.parse(saved);
  document.getElementById('input-bar').style.display = 'block';
  requestNotificationPermission();
  loadMessages();
  setInterval(loadMessages, 2000);
  setInterval(checkTyping, 3000);
  updateOnlineCount();
  setInterval(updateOnlineCount, 15000);
  loadAnnouncement();
  setInterval(loadAnnouncement, 30000);
}

async function loadAnnouncement() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=get_announcements');
    const d = await res.json();
    if (d.announcement) {
      document.getElementById('announce-text').innerText = d.announcement;
      document.getElementById('announce-bar').style.display = 'flex';
    }
  } catch(e) {}
}

/* ── TYPING INDICATOR ── */
let myTypingTimeout = null;

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('msg-input');
  if (!input) return;
  input.addEventListener('input', () => {
    sendTypingStatus(true);
    clearTimeout(myTypingTimeout);
    myTypingTimeout = setTimeout(() => sendTypingStatus(false), 2000);
  });
});

async function sendTypingStatus(isTyping) {
  if (!currentUser) return;
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'set_typing',
        email: currentUser.email,
        name: currentUser.name,
        typing: isTyping
      })
    });
  } catch(e) {}
}

async function checkTyping() {
  if (!currentUser) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=get_typing');
    const d = await res.json();
    const ti = document.getElementById('typing-indicator');
    const tn = document.getElementById('typing-name');
    if (d.typing && d.email !== currentUser.email) {
      tn.innerText = d.name || 'Someone';
      ti.style.display = 'flex';
    } else {
      ti.style.display = 'none';
    }
  } catch(e) {
    document.getElementById('typing-indicator').style.display = 'none';
  }
}
async function updateOnlineCount() {
  if (!currentUser) return;
  // Sirf background mein bhejo, await mat karo
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'set_online',
      email: currentUser.email,
      name: currentUser.name
    })
  }).catch(() => {});
  // Count locally loadMessages ke saath update hoga
  fetch(APPS_SCRIPT_URL + '?action=get_online_count')
    .then(r => r.json())
    .then(d => {
      document.getElementById('online-count').innerText = '● ' + (d.count || 1) + ' Online';
    }).catch(() => {});
}
/* ── LOAD MESSAGES ── */
async function loadMessages() {
  try {
    const res = await fetch(APPS_SCRIPT_URL + "?action=get_chat_messages");
    const data = await res.json();
    // profileImage ko trim karo taaki render fast ho
data.forEach(m => {
  if (m.profileImage && m.profileImage.length > 5000) {
    m.profileImage = ''; // too large, skip karo
  }
});
    if (data.length === lastMessageCount) return;

    const isFirstLoad = lastMessageCount === 0;
    const newCount = data.length - lastMessageCount;
    lastMessageCount = data.length;
    renderMessages(data);

    if (!isFirstLoad && newCount > 0) {
      const last = data[data.length - 1];
      if (last.email !== currentUser.email) {
        notifySound.play().catch(() => {});
        if (!isWindowFocused) {
          showBadge();
          showPushNotification(last.name, last.message);
        }
      }
    }
} catch (e) { console.error('loadMessages error:', e); }
}
/* ── RENDER HELPERS ── */
function initials(name) {
  return (name || "?").trim().split(/\s+/).map(w => w[0]).join("").substring(0,2).toUpperCase();
}

function formatTime(ts) {
  try {
    return new Date(ts).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ""; }
}

function formatDate(ts) {
  try {
    const d = new Date(ts);
    const today = new Date();
    const yesterday = new Date(); yesterday.setDate(today.getDate()-1);
    if (d.toDateString() === today.toDateString()) return 'Today';
    if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  } catch(e) { return ''; }
}

/* ═══════════════════════════════════════════════════
   ✅ FIX 1: REACTIONS — GLOBAL SCOPE MEIN MOVE KIYA
   (Pehle yeh sendMessage() ke andar tha — isliye
    renderMessages() aur onclick dono fail hote the)
═══════════════════════════════════════════════════ */
const REACTIONS = ['👍','❤️','😂','😮','😢','🔥'];
let reactionsData = JSON.parse(localStorage.getItem('baaz_reactions') || '{}');

function saveReactions() {
  localStorage.setItem('baaz_reactions', JSON.stringify(reactionsData));
}

function renderReactions(msgId) {
  const data = reactionsData[msgId] || {};
  return Object.keys(data).map(emoji => {
    const users = data[emoji] || [];
    if (!users.length) return '';
    const isMine = users.includes(currentUser?.email);
    return `<span class="reaction-btn ${isMine ? 'active' : ''}"
      onclick="toggleReaction('${msgId}','${emoji}')"
      title="${users.join(', ')}">
      ${emoji} ${users.length}
    </span>`;
  }).join('');
}

function showReactPicker(idx, msgId) {
  document.querySelectorAll('.react-picker').forEach(e => e.remove());

  const picker = document.createElement('div');
  picker.className = 'react-picker';
  picker.style.cssText = `
    position:fixed;z-index:999;
    background:var(--card);border:0.5px solid var(--border);
    border-radius:999px;padding:6px 10px;
    display:flex;gap:8px;font-size:20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  `;

  const msgEl = document.getElementById(`msg-${msgId}`);
  if (msgEl) {
    const rect = msgEl.getBoundingClientRect();
    picker.style.top = (rect.top - 50) + 'px';
    picker.style.left = Math.min(rect.left, window.innerWidth - 280) + 'px';
  }

  REACTIONS.forEach(emoji => {
    const btn = document.createElement('span');
    btn.innerText = emoji;
    btn.style.cursor = 'pointer';
    btn.onclick = () => {
      toggleReaction(msgId, emoji);
      picker.remove();
    };
    picker.appendChild(btn);
  });

  document.body.appendChild(picker);
  setTimeout(() => document.addEventListener('click', () => picker.remove(), { once: true }), 100);
}

function toggleReaction(msgId, emoji) {
  if (!currentUser) return;
  if (!reactionsData[msgId]) reactionsData[msgId] = {};
  if (!reactionsData[msgId][emoji]) reactionsData[msgId][emoji] = [];

  const users = reactionsData[msgId][emoji];
  const idx = users.indexOf(currentUser.email);

  if (idx === -1) users.push(currentUser.email);
  else users.splice(idx, 1);

  if (!users.length) delete reactionsData[msgId][emoji];
  saveReactions();

  const bar = document.getElementById(`react-${msgId}`);
  if (bar) bar.innerHTML = renderReactions(msgId);
}

/* ── RENDER MESSAGES ── */
function renderMessages(messages) {
  const win = document.getElementById('chat-window');
  if (!messages.length) {
    win.innerHTML = '<div id="empty-state"><i class="fas fa-comment-dots"></i>Koi message nahi abhi.<br>Sabse pehle aap baat shuru karein! 👋</div>';
    return;
  }

  const isAdmin = currentUser.role === 'admin';
  let lastDate = '';
  let html = '';

  messages.forEach((m, idx) => {
    const isMine = m.email === currentUser.email;
    const mIsAdmin = m.role === 'admin';
    const rowCls = isMine ? 'msg-row mine' : (mIsAdmin ? 'msg-row other admin-msg' : 'msg-row other');

    let avatarCls = 'mine';
    if (!isMine) {
      if (mIsAdmin) avatarCls = 'admin';
      else if (m.gender === 'Female' || m.gender === 'female') avatarCls = 'female';
      else avatarCls = 'male';
    }

    const msgDate = formatDate(m.timestamp);
    if (msgDate && msgDate !== lastDate) {
      html += `<div class="date-divider">${msgDate}</div>`;
      lastDate = msgDate;
    }

    const tickHtml = isMine
      ? `<span class="tick ${m.seen ? 'seen' : 'sent'}">${m.seen ? '✓✓' : '✓'}</span>`
      : '';

  const deleteBtn = isAdmin
      ? `<button class="delete-btn" onclick="deleteMessage('${escapeHtml(m.id||idx)}',this)" title="Delete"><i class="fas fa-times"></i></button>`
      : '';

    const pinBtn = isAdmin
      ? `<button class="delete-btn" style="right:16px;top:14px;background:#10b981;" 
          onclick="pinMessage('${escapeHtml(String(m.id||idx))}','${escapeHtml(m.message.substring(0,100))}')" 
          title="Pin">📌</button>`
      : '';
    const hasPhoto = m.profileImage && m.profileImage.length > 10 && m.profileImage !== 'undefined' && m.profileImage !== 'null';
    const avatarContent = hasPhoto
      ? `<img src="${m.profileImage}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.style.display='none'">`
      : escapeHtml(initials(m.name));

    /* ✅ FIX 2: Reply button ke liye data attributes use kiye
       (Pehle inline onclick mein single-quote wali values thi
        jो apostrophe wale names se break ho jaati thi) */
    html += `<div class="${rowCls}" id="msg-${escapeHtml(String(m.id||idx))}">
      <div class="avatar ${avatarCls}" onclick="viewPhoto('${hasPhoto ? m.profileImage : ''}','${escapeHtml(m.name)}')">
        ${avatarContent}
      </div>
      <div class="bubble-wrap">
        ${deleteBtn}${pinBtn}
        <div class="name-tag">
          ${escapeHtml(m.name)}
          <span class="reply-trigger"
            data-name="${escapeHtml(m.name)}"
            data-msg="${escapeHtml(m.message.substring(0, 100))}"
            style="cursor:pointer;font-size:10px;color:var(--text-dim);margin-left:4px;"
            title="Reply">↩</span>
          ${mIsAdmin ? '<span class="badge">ADMIN</span>' : ''}
        </div>
        ${m.replyTo ? `<div class="reply-bubble">↩ ${escapeHtml(m.replyTo)}</div>` : ''}
        <div class="bubble">${escapeHtml(filterBadWords(m.message))}</div>
        <div class="time-tag">${formatTime(m.timestamp)}${tickHtml}</div>
        <div class="reaction-bar" id="react-${escapeHtml(String(m.id||idx))}">
          ${renderReactions(m.id||idx)}
        </div>
        <button class="react-trigger" onclick="showReactPicker(${idx},'${escapeHtml(String(m.id||idx))}')">😊+</button>
      </div>
    </div>`;
  });

  win.innerHTML = html;
  win.scrollTop = win.scrollHeight;
}

/* ── DELETE MESSAGE (Admin) ── */
async function deleteMessage(msgId, btn) {
  if (!confirm('Yeh message delete karein?')) return;
  const row = btn.closest('.msg-row');
  if (row) row.style.opacity = '0.4';
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete_chat_message', msgId })
    });
    if (row) row.remove();
    lastMessageCount--;
  } catch(e) {
    if (row) row.style.opacity = '1';
    alert('Delete failed. Try again.');
  }
}

/* ═══════════════════════════════════════════════════
   ✅ FIX 3: REPLY SYSTEM — sendMessage() SE PEHLE RAKHA
   (Pehle yeh neeche tha — cancelReply() sendMessage
    ke andar call ho raha tha lekin defined baad mein tha)
═══════════════════════════════════════════════════ */
let replyingTo = null;

function setReply(name, message) {
  replyingTo = { name, message };
  const preview = document.getElementById('reply-preview');
  const text = document.getElementById('reply-preview-text');
  preview.style.display = 'flex';
  text.innerText = name + ': ' + message.substring(0, 60);
  document.getElementById('msg-input').focus();
}

function cancelReply() {
  replyingTo = null;
  document.getElementById('reply-preview').style.display = 'none';
}
  /* ── PIN MESSAGE ── */
let pinnedMsg = localStorage.getItem('baaz_pinned') || '';

function pinMessage(msgId, text) {
  if (currentUser.role !== 'admin') return;
  pinnedMsg = text;
  localStorage.setItem('baaz_pinned', text);
  showPinBar(text);
}

function showPinBar(text) {
  if (!text) return;
  document.getElementById('pin-text').innerText = '📌 ' + text.substring(0, 80);
  document.getElementById('pin-bar').style.display = 'flex';
}

function loadPin() {
  const p = localStorage.getItem('baaz_pinned');
  if (p) showPinBar(p);
}

/* ── SEND MESSAGE ── */
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentUser) return;

  const filtered = filterBadWords(text);
  if (filtered !== text) {
    if (!confirm('Aapke message mein inappropriate words hain. Phir bhi bhejein?')) return;
  }

  const replyToText = replyingTo
    ? replyingTo.name + ': ' + replyingTo.message.substring(0, 60)
    : "";

  input.value = '';
  emojiOpen = false;
  document.getElementById('emoji-picker').classList.remove('open');
  document.getElementById('send-btn').disabled = true;
  sendTypingStatus(false);
  cancelReply();

  // Turant locally dikhao
  const win = document.getElementById('chat-window');
  const tempDiv = document.createElement('div');
  tempDiv.id = 'temp-msg';
  tempDiv.innerHTML = `<div class="msg-row mine" style="opacity:0.6">
    <div class="avatar mine">${initials(currentUser.name)}</div>
    <div class="bubble-wrap">
      <div class="bubble">${escapeHtml(filtered)}</div>
      <div class="time-tag">Sending...</div>
    </div>
  </div>`;
  win.appendChild(tempDiv);
  win.scrollTop = win.scrollHeight;

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "send_chat_message",
        email: currentUser.email,
        name: currentUser.name,
        role: currentUser.role || "student",
        message: filtered,
        gender: currentUser.gender || "",
        profileImage: currentUser.profileImage || "",
        replyTo: replyToText
      })
    });
    loadMessages();
  } catch (e) {}

  document.getElementById('send-btn').disabled = false;
  input.focus();
}
/* ── VIEW PHOTO ── */
function viewPhoto(src, name) {
  if (!src) return;
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;';
  d.innerHTML = `<img src="${src}" style="max-width:90vw;max-height:80vh;border-radius:16px;object-fit:contain;"><div style="color:#fff;margin-top:12px;font-weight:800;font-size:16px;">${escapeHtml(name)}</div>`;
  d.onclick = () => d.remove();
  document.body.appendChild(d);
}

/* ── UTILS ── */
function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── DOMContentLoaded ── */
document.addEventListener('DOMContentLoaded', () => {
  // Enter key se message bhejo
  document.getElementById('msg-input')?.addEventListener('keypress', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ✅ FIX 2 (part 2): Event delegation — dynamically created
     reply-trigger elements ke liye click handler
     (Inline onclick hata ke yahan centrally handle kiya) */
  document.getElementById('chat-window').addEventListener('click', e => {
    const trigger = e.target.closest('.reply-trigger');
    if (trigger) {
      setReply(trigger.dataset.name, trigger.dataset.msg);
    }
  });
});
  function scrollToBottom() {
  const win = document.getElementById('chat-window');
  win.scrollTop = win.scrollHeight;
}

document.addEventListener('DOMContentLoaded', () => {
  const win = document.getElementById('chat-window');
  const btn = document.getElementById('scroll-btn');
  win.addEventListener('scroll', () => {
    const isNearBottom = win.scrollHeight - win.scrollTop - win.clientHeight < 100;
    btn.style.display = isNearBottom ? 'none' : 'flex';
  });
});

init();
</script>
