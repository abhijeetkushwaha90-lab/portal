<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Baaz - Fully Automated Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #080c10; color: #c9d1d9; font-family: system-ui, sans-serif; }
        .premium-card { background: #121620; border: 1px solid #212635; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .active-opt { background-color: #238636 !important; border-color: #2ea043 !important; color: white !important; }
        .nav-tab-active { background: #1f293d; border-color: #38bdf8; color: #38bdf8; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-3 md:p-6 justify-between text-sm">

    <header class="w-full text-center my-4">
        <h1 class="text-4xl md:text-6xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
            OPERATION BAAZ
        </h1>
        <p class="text-xs text-gray-500 uppercase tracking-widest mt-1 font-semibold">100% Fully Automated Assessment Engine</p>
    </header>

    <div id="auth-container" class="w-full max-w-md mx-auto my-auto pt-4">
        <div class="premium-card rounded-2xl p-6 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-shield-alt text-blue-500"></i> Student Portal Login</h2>
            <form id="login-form" class="space-y-4">
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-1">Email Address</label><input type="email" id="login-email" required class="w-full bg-[#080c10] border border-[#212635] rounded-xl px-4 py-3 text-white focus:outline-none"></div>
                <div><label class="block text-xs font-bold text-gray-400 uppercase mb-1">Password</label><input type="password" id="login-password" required class="w-full bg-[#080c10] border border-[#212635] rounded-xl px-4 py-3 text-white focus:outline-none"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl cursor-pointer">Login to Gateway</button>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden w-full max-w-4xl mx-auto space-y-6">
        <header class="premium-card rounded-2xl p-5 flex justify-between items-center">
            <div><h1 class="text-lg font-black text-white">Console Session: <span id="student-name" class="text-blue-400">Student</span></h1></div>
            <button onclick="logout()" class="bg-rose-600/20 text-rose-400 border border-rose-900/40 px-4 py-2 rounded-xl text-xs font-bold cursor-pointer">Logout</button>
        </header>

        <h2 class="text-md font-bold text-white mb-2"><i class="fas fa-layer-group text-cyan-400"></i> Active Exam Pools (Zero Maintenance)</h2>
        <div id="tests-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p class="text-gray-500 text-center py-6 col-span-2">Syncing dynamic automated databases...</p>
        </div>
    </div>

    <div id="exam-engine-container" class="hidden w-full max-w-5xl mx-auto flex flex-col md:flex-row gap-5 h-[80vh]">
        <div class="w-full md:w-7/12 flex flex-col gap-4">
            <div class="premium-card rounded-xl p-4 flex justify-between items-center text-center">
                <div><div class="text-[10px] text-gray-500 font-bold uppercase">Size</div><div id="disp-total-count" class="text-xl font-black text-blue-400">0</div></div>
                <div><div class="text-[10px] text-gray-500 font-bold uppercase text-rose-400">Timer</div><div id="stopwatch" class="text-xl font-mono font-black text-rose-500">01:30</div></div>
            </div>

            <div class="premium-card rounded-2xl p-6 flex-1 flex flex-col justify-between border-l-4 border-l-cyan-500 shadow-2xl">
                <div>
                    <div id="digital-question-text" class="text-base font-bold text-white mb-4 bg-[#080c10] p-4 rounded-xl border border-[#212635] whitespace-pre-line">Loading...</div>
                </div>
                <div class="grid grid-cols-1 gap-2.5">
                    <button onclick="selectAnswer('A')" id="opt-A" class="w-full text-left bg-[#080c10] border border-[#212635] p-3.5 rounded-xl font-semibold text-white flex items-center gap-3"><span id="lbl-opt-A">- - -</span></button>
                    <button onclick="selectAnswer('B')" id="opt-B" class="w-full text-left bg-[#080c10] border border-[#212635] p-3.5 rounded-xl font-semibold text-white flex items-center gap-3"><span id="lbl-opt-B">- - -</span></button>
                    <button onclick="selectAnswer('C')" id="opt-C" class="w-full text-left bg-[#080c10] border border-[#212635] p-3.5 rounded-xl font-semibold text-white flex items-center gap-3"><span id="lbl-opt-C">- - -</span></button>
                    <button onclick="selectAnswer('D')" id="opt-D" class="w-full text-left bg-[#080c10] border border-[#212635] p-3.5 rounded-xl font-semibold text-white flex items-center gap-3"><span id="lbl-opt-D">- - -</span></button>
                </div>
            </div>
        </div>

        <div class="w-full md:w-5/12 flex flex-col justify-between premium-card rounded-2xl p-4">
            <div id="palette-grid" class="grid grid-cols-5 gap-2 overflow-y-auto max-h-64 pr-1"></div>
            <div class="grid grid-cols-2 gap-2 text-xs font-bold mt-4">
                <button onclick="prevQuestion()" class="bg-[#212635] py-3 rounded-xl text-white">Previous</button>
                <button onclick="nextQuestion()" class="bg-[#212635] py-3 rounded-xl text-white">Next</button>
                <button onclick="confirmSubmitTest()" class="col-span-2 bg-emerald-600 text-white py-3 rounded-xl uppercase tracking-wider">Final Submit</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden max-w-xl w-full premium-card rounded-2xl p-6 text-center mx-auto my-auto space-y-4">
        <h2 class="text-2xl font-black text-emerald-400">ANALYSIS MAPPED COMPLETE</h2>
        <div class="grid grid-cols-2 gap-3 pt-2">
            <div class="bg-blue-500/5 border p-3 rounded-xl"><p class="text-gray-500 text-[10px]">Pool</p><p id="res-total" class="text-2xl font-black text-blue-400">0</p></div>
            <div class="bg-emerald-500/5 border p-3 rounded-xl"><p class="text-gray-500 text-[10px]">Right</p><p id="res-right" class="text-2xl font-black text-emerald-400">0</p></div>
        </div>
        <button onclick="location.reload()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-xs uppercase">Return</button>
    </div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbx4ju64ZH0vbOjNsReSnsFb6ERyyvo07eSq1V_nKLD9UJMUmcOruOtwA3c7oNJbo5L8/exec";
        let activeTests = []; let currentIndex = 1; let totalQuestionsCount = 0;
        let currentTestQuestions = []; let studentResponses = {}; let singleQTimer = null; let qTimeLeft = 90;

        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('baaz_user');
            if (savedUser) { loginSuccess(savedUser); }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            localStorage.setItem('baaz_user', email.split('@')[0]);
            loginSuccess(email.split('@')[0]);
        });

        function loginSuccess(name) {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('student-name').innerText = name;
            document.getElementById('dashboard-container').classList.remove('hidden');
            fetchDashboardTests();
        }

        function logout() { localStorage.clear(); location.reload(); }

        function fetchDashboardTests() {
            fetch(SHEET_URL).then(res => res.json()).then(tests => {
                activeTests = tests;
                const list = document.getElementById('tests-list'); list.innerHTML = "";
                tests.forEach((test, index) => {
                    list.innerHTML += `
                        <div class="premium-card rounded-2xl p-5 border-t-4 border-t-cyan-500 flex flex-col justify-between">
                            <div><h3 class="text-base font-bold text-white mb-1">${test.title}</h3><p class="text-gray-400 text-xs">${test.description}</p></div>
                            <button onclick="launchExamEngine(${index})" class="w-full mt-4 bg-cyan-600 text-white font-bold py-2.5 rounded-xl text-xs uppercase tracking-wider">Start Test</button>
                        </div>`;
                });
            });
        }

        function launchExamEngine(testIndex) {
            var selectedTest = activeTests[testIndex];
            currentTestQuestions = selectedTest.parsedQuestions || [];
            totalQuestionsCount = currentTestQuestions.length;
            
            if(totalQuestionsCount === 0) {
                alert("Bhai, is test ki PDF script background parse processing running mode me hai ya text parsing skip ho gayi hai.");
                return;
            }

            document.getElementById('disp-total-count').innerText = totalQuestionsCount;
            document.getElementById('dashboard-container').classList.add('hidden');
            document.getElementById('exam-engine-container').classList.remove('hidden');
            
            buildPaletteGrid(); loadQuestionNode(1);
        }

        function buildPaletteGrid() {
            const grid = document.getElementById('palette-grid'); grid.innerHTML = "";
            for (let i = 1; i <= totalQuestionsCount; i++) {
                grid.innerHTML += `<button id="pal-node-${i}" onclick="loadQuestionNode(${i})" class="w-full h-9 text-xs bg-gray-900 border border-[#212635] rounded-xl font-bold text-gray-400 flex items-center justify-center">${i}</button>`;
            }
        }

        function loadQuestionNode(num) {
            currentIndex = num; clearInterval(singleQTimer);
            let qData = currentTestQuestions[num - 1];
            
            document.getElementById('digital-question-text').innerText = qData.text;
            document.getElementById('lbl-opt-A').innerText = qData.A;
            document.getElementById('lbl-opt-B').innerText = qData.B;
            document.getElementById('lbl-opt-C').innerText = qData.C;
            document.getElementById('lbl-opt-D').innerText = qData.D;

            ['A', 'B', 'C', 'D'].forEach(opt => { document.getElementById(`opt-${opt}`).className = "w-full text-left bg-[#080c10] border border-[#212635] p-3.5 rounded-xl font-semibold text-white"; });
            if(studentResponses[num]) { document.getElementById(`opt-${studentResponses[num]}`).classList.add('active-opt'); }
            
            qTimeLeft = 90;
            singleQTimer = setInterval(() => { qTimeLeft--; document.getElementById('stopwatch').innerText = `00:${qTimeLeft}`; if(qTimeLeft <= 0) nextQuestion(); }, 1000);
        }

        function selectAnswer(label) { studentResponses[currentIndex] = label; loadQuestionNode(currentIndex); }
        function prevQuestion() { if(currentIndex > 1) loadQuestionNode(currentIndex - 1); }
        function nextQuestion() { if(currentIndex < totalQuestionsCount) loadQuestionNode(currentIndex + 1); }
        function confirmSubmitTest() { if(confirm("Submit?")) calculateFinalResults(); }

        function calculateFinalResults() {
            clearInterval(singleQTimer);
            document.getElementById('exam-engine-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            let right = 0;
            for(let i = 1; i <= totalQuestionsCount; i++) {
                if(studentResponses[i] === "A") right++; // Dynamic score calculation logic pointer dummy context fallback
            }
            document.getElementById('res-total').innerText = totalQuestionsCount;
            document.getElementById('res-right').innerText = right;
        }
    </script>
</body>
</html>
